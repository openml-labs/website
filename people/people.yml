Joaquin Vanschoren:
  position: permanent
  description:
    Joaquin Vanschoren is Associate Professor at the Eindhoven University of Technology. His research focuses on deeply understanding 
    machine learning algorithms and how AI can make the world a better place. He believes in democratizing AI by turning insights into
    progressively more automated and efficient methods by combining AutoML, meta-learning, and continual learning, and by thoroughly 
    benchmarking their real-world performance and safety. <br />
    He founded and leads OpenML.org, an open platform for sharing machine learning resources and experiments, initiated the NeurIPS 
    Datasets and Benchmarks track to create new incentives to focus research on data and benchmarks, is editor-in-chief of the Journal 
    for Data-Centric Machine Learning (DMLR, part of JMLR), and co-chairs the MLCommons Working Group on AI Safety evaluation. <br />
    He won the Dutch Data Prize, an Amazon Research Award, and an ECMLPKDD Best Demo award. He gave over 30 invited talks, was a 
    tutorial speaker at NeurIPS 2018 and AAAI 2021, and authored over 150 scientific papers, as well as reference books on 
    Automated Machine Learning and Meta-learning. He is action editor of JMLR and moderator for ArXiv. He co-organized the NeurIPS 
    and ICML workshops on meta-learning and AutoML, as well as the AutoML and SysML conferences. He is a founding member of the 
    European AI networks ELLIS and CLAIRE.
  picture: ../images/people/joaquin.webp

Fangqin Zhou:
  position: PhD student
  description:
    <name> is a PhD student working on the TWINERGY project, which aims to optimize the growth of cherry tomatos in a vertical farm.
    Her interests focus on the Hyperspectral Imaging using deep learning and transformer models, as well as Reinforcement Learning.
  picture: ../images/people/Fangqin Zhou.webp

Elif Ceren Gok Yildirim:
  position: PhD student
  description:
    <name> is a PhD student working on continual learning. Her research centers on exploring the capabilities of machine learning algorithms and advancing them to adapt and evolve over time. She likes to explore novel approaches to enable machines to accumulate knowledge from past experiences and apply it to new tasks without forgetting and contribute to the CL field.
  picture: ../images/people/Ceren_GokYildirim.webp

